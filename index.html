<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/alertifyjs@1.14.0/build/css/alertify.min.css"/>
    <!-- AlertifyJS themes -->
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/alertifyjs@1.14.0/build/css/themes/default.min.css"/>
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/alertifyjs@1.14.0/build/css/themes/semantic.min.css"/>
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light">
    <div id="app">
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm mb-4">
            <div class="container">
                <a class="navbar-brand fw-bold" href="#">::. SISTEMA DE GESTIÓN DE BIBLIOTECA .::</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                    <div class="navbar-nav ms-auto">
                        <a class="nav-link fs-5 px-3" href="#" @click="abrirVentana('autor')">Autores</a>
                        <a class="nav-link fs-5 px-3" href="#" @click="abrirVentana('libros')">Libros</a>   
                    </div>
                </div>
            </div>
        </nav>
        <div id="appSistema" class="container">
            <div class="row justify-content-center">
                <div class="col-12 col-lg-10">
            <autor @buscar='buscar("busqueda_autor","obtenerAutores")' :forms="forms" ref="autor" v-show="forms.autor.mostrar"></autor>
            <busqueda_autor @modificar='modificar("autor","modificarAutor", $event)' ref="busqueda_autor" v-show="forms.busqueda_autor.mostrar"></busqueda_autor>
            <libros @buscar='buscar("busqueda_libros","obtenerLibros")' :forms="forms" ref="libros" v-show="forms.libros.mostrar"></libros>
            <busqueda_libros @modificar='modificar("libros","modificarLibro", $event)' ref="busqueda_libros" v-show="forms.busqueda_libros.mostrar"></busqueda_libros>
                </div>
            </div>
        </div>
    </div>
    <script src="//cdn.jsdelivr.net/npm/alertifyjs@1.14.0/build/alertify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/crypto-js@4.1.1/crypto-js.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dexie/4.2.0/dexie.min.js"
        integrity="sha512-LuXLH9xON6/aAGYxi4Z1Dx8588Z80gY3iMmGtUlYmblUc1ulC/cGHuANXIvm8fnIWp5ShUk2MRBIWylGguXF9g=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
   <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="componentes/autor.js"></script>
    <script src="componentes/busqueda_autor.js"></script>
    <script src="componentes/libros.js"></script>
    <script src="componentes/busqueda_libros.js"></script>
    <script src="main.js"></script>
</body>
</html>
